# ============================================================
# Polygon Free-Tier OHLCV Pipeline — 15-Min Config
# ============================================================

polygon:
  base_url:          "https://api.polygon.io"
  timespan:          "minute"      # Polygon aggregation type: "minute" for intraday bars
  multiplier:        15            # 15-minute bars (Polygon supports: 1, 5, 15, 30, 60)
  adjusted:          true          # Split-adjusted prices
  limit:             50000         # Max bars per request
  requests_per_min:  5             # Free-tier hard cap: 5 req/min → ~144k bars/min
  retry_attempts:    3
  retry_backoff_s:   20
  timeout_s:         30

universe:
  min_adtv_usd:      1_000_000
  min_price:         5.0
  max_price:         50_000.0
  min_history_days:  60
  min_bar_coverage:  0.90
  adtv_window:       20

  default_tickers:          # ← MUST be indented under universe:
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - META
    - AMD
    - TSLA
    - MSTR
    - PLTR
    - SMCI
    - JPM
    - BAC
    - GS
    - MS
    - C
    - XOM
    - CVX
    - OXY
    - SLB
    - HAL
    - LLY
    - MRNA
    - BIIB
    - REGN
    - VRTX
    - CRM
    - NOW
    - SNOW
    - NET
    - CRWD
    - HD
    - MCD
    - SBUX
    - NKE
    - CAT
    - DE
    - LMT
    - RTX
    - GE
    - QCOM
    - AVGO
    - MU
    - LRCX
    - AMAT

cleaning:
  max_daily_return:        0.10
  max_intraday_range:      0.10
  max_volume_spike_mult:   10.0
  volume_spike_window:     20
  max_overnight_gap:       0.40
  min_volume:              0
  forward_fill_limit:      0
  enforce_ohlc_order:      true

storage:
  raw_dir:           "data/raw/"
  clean_dir:         "data/clean_15min/"
  cache_dir:         "data/cache/"
  report_dir:        "reports/"
  compression:       "snappy"
  partition_cols:    ["year"]

dates:
  start_date:        "2024-03-22"
  calendar:          "NYSE"

logging:
  level:             "INFO"
  file:              "reports/pipeline.log"
